<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+Mono+TC&display=swap" rel="stylesheet">
<style>
  :root {
    /* 莫蘭迪色系 — 石板藍灰，低飽和霧感 */
    --bg:           #1e2228;  /* 深石板藍灰 */
    --surface:      #262d36;  /* 淺石板灰 */
    --surface2:     #212830;  /* 中間層 */
    --border:       #374252;  /* 藍灰邊框 */
    --border-dark:  #4a5668;  /* 深藍灰邊框 */
    --text:         #dde3ec;  /* 提高對比 */
    --text-muted:   #a0b0c4;  /* 中藍灰提亮 */
    --text-dim:     #7a8fa4;  /* 暗藍灰提亮 */
    --accent:       #7a9ab0;  /* 霧鋼藍，#708090 系 */
    --accent-light: rgba(122,154,176,.12);
    --accent-border:rgba(122,154,176,.32);
    --success:      #6a9e85;  /* 霧鼠尾草綠 */
    --success-light:rgba(106,158,133,.1);
    --warn:         #b8946a;  /* 沙漠土黃（低飽和）*/
    --warn-light:   rgba(184,148,106,.1);
    --warn-border:  rgba(184,148,106,.32);
    --danger:       #a87272;  /* 霧玫瑰 */
    --optional:     #8890b4;  /* 霧靛藍 */
    --optional-light:rgba(136,144,180,.1);
    --shadow-sm:    0 1px 3px rgba(0,0,0,.45), 0 1px 2px rgba(0,0,0,.35);
    --shadow:       0 4px 12px rgba(0,0,0,.55);
    --radius:       10px;
    --radius-sm:    6px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; scrollbar-width: none; }
  html::-webkit-scrollbar { display: none; }
  body { scrollbar-width: none; }
  body::-webkit-scrollbar { display: none; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'LXGW WenKai Mono TC', 'Microsoft JhengHei', monospace;
    font-size: 19px;
    min-height: 100vh;
  }

  /* ── Layout ── */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
  }
  .app-header-inner {
    display: flex;
    align-items: center;
    gap: 20px;
    height: 56px;
  }
  .app-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
  }
  .app-title span { color: var(--accent); }

  /* ── RQ Tabs ── */
  .rq-tabs-wrap {
    display: flex;
    align-items: center;
    flex: 1;
    min-width: 0;
    gap: 4px;
  }
  .rq-tab-scroll-btn {
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    transition: all .15s;
  }
  .rq-tab-scroll-btn:hover { border-color: var(--accent); color: var(--accent); }
  .rq-tabs {
    display: flex;
    gap: 6px;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-dark) transparent;
    padding: 8px 2px 6px;
    min-width: 0;
  }
  .rq-tabs::-webkit-scrollbar { height: 4px; }
  .rq-tabs::-webkit-scrollbar-track { background: transparent; }
  .rq-tabs::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 2px; }
  .rq-tab {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    font-size: 16px;
    color: var(--text-muted);
    transition: all .15s;
    user-select: none;
    max-width: 220px;
    min-width: 0;
    flex-shrink: 0;
  }
  .rq-tab:hover { border-color: var(--accent); color: var(--accent); }
  .rq-tab.active {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }
  .rq-tab .tab-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
    flex: 1;
  }
  .rq-tab .tab-progress {
    font-size: 13px;
    font-weight: 600;
    background: var(--accent);
    color: #1a2028;
    border-radius: 10px;
    padding: 1px 7px;
    min-width: 36px;
    text-align: center;
    flex-shrink: 0;
  }
  .rq-tab.active .tab-progress { background: var(--accent); }
  .rq-tab .tab-del {
    color: var(--text-dim);
    font-size: 16px;
    line-height: 1;
    padding: 0 3px;
    border-radius: 4px;
    transition: color .15s;
    flex-shrink: 0;
  }
  .rq-tab .tab-del:hover { color: var(--danger); }
  .btn-new-rq {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    background: var(--accent);
    color: #1a2028;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    white-space: nowrap;
    transition: background .15s;
  }
  .btn-new-rq:hover { background: #b0bec5; }

  /* ── Main content ── */
  .main { padding: 24px 32px; }

  /* ── NOTE / TODO block ── */
  .note-block {
    background: rgba(112,128,144,.07);
    border: 1.5px solid rgba(112,128,144,.3);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .note-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: rgba(112,128,144,.1);
    border-bottom: 1px solid rgba(112,128,144,.22);
    cursor: pointer;
    user-select: none;
  }
  .note-header-title { font-size: 18px; font-weight: 700; color: #9ab4c8; flex: 1; }
  .note-header .note-saved { font-size: 14px; color: #7090a8; opacity: 0; transition: opacity .3s; }
  .note-header .note-saved.show { opacity: 1; }
  .note-collapse-icon { font-size: 12px; color: #7090a8; transition: transform .2s; }
  .note-block.collapsed .note-collapse-icon { transform: rotate(-90deg); }
  .note-body { padding: 12px 16px; }
  .note-block.collapsed .note-body { display: none; }
  .note-textarea {
    width: 100%;
    min-height: 115px;
    border: 1px solid rgba(112,128,144,.22);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 18px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    resize: vertical;
    outline: none;
    line-height: 1.7;
  }
  .note-textarea:focus { border-color: var(--warn); box-shadow: 0 0 0 3px rgba(122,154,176,.12); }
  .note-textarea::placeholder { color: #566070; }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h2 { font-size: 22px; margin-bottom: 8px; color: var(--text); }

  /* ── Section card ── */
  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 22px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .section-icon { font-size: 22px; }
  .section-title { font-size: 20px; font-weight: 700; flex: 1; }
  .section-progress {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2px 10px;
  }
  .section-progress.done { background: var(--success-light); color: var(--success); border-color: #6ee7b7; }

  /* ── Version card (collapsible) ── */
  .version-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .version-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
    transition: background .15s;
  }
  .version-header:hover { background: var(--surface2); }
  .version-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    border-radius: 9px;
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 700;
    font-size: 16px;
    flex-shrink: 0;
  }
  .version-name { font-size: 20px; font-weight: 700; flex: 1; }
  .version-prog-bar-wrap {
    width: 140px;
    height: 7px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .version-prog-bar { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
  .version-prog-bar.done { background: var(--success); }
  .version-prog-text { font-size: 16px; color: var(--text-muted); min-width: 44px; text-align: right; }
  .collapse-icon { color: var(--text-dim); font-size: 12px; transition: transform .2s; }
  .version-card.collapsed .collapse-icon { transform: rotate(-90deg); }
  .version-body {
    padding: 0 0 22px;
    display: grid;
    grid-template-columns: minmax(200px, auto) 1fr 1.4fr;
    gap: 0;
  }
  .version-body > .sub-section {
    padding: 0 24px;
  }
  .version-body > .sub-section + .sub-section {
    border-left: 1px solid var(--border);
  }
  .version-card.collapsed .version-body { display: none; }

  /* ── Version files button ── */
  .btn-ver-files {
    padding: 3px 10px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text-muted); font-family: inherit; font-size: 13px;
    cursor: pointer; transition: all .15s; white-space: nowrap; flex-shrink: 0;
  }
  .btn-ver-files:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .btn-ver-files.has-files { border-color: var(--accent); color: var(--accent); }

  /* ── Sub-section ── */
  .sub-section { }
  .section-done-ts {
    font-size: 11px;
    font-weight: 400;
    color: var(--success);
    letter-spacing: 0;
    text-transform: none;
    margin-left: 8px;
    opacity: .85;
  }
  .sub-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .sub-title.warn-title { color: var(--warn); }

  /* ── Checkbox item ── */
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 9px 10px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .check-item:last-child { border-bottom: none; }
  .check-item:hover { background: rgba(255,255,255,0.04); border-radius: 6px; }
  .check-item:hover .check-box { border-color: var(--accent); }
  .check-item.warn-item:hover { background: rgba(184,148,106,0.16); }
  .check-box {
    width: 22px;
    height: 22px;
    border: 2px solid var(--border-dark);
    border-radius: 5px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    background: var(--surface2);
  }
  .check-item.checked .check-box {
    background: var(--success);
    border-color: var(--success);
  }
  .check-item.checked .check-box::after {
    content: '';
    width: 12px;
    height: 6px;
    border-left: 2.5px solid #1a2028;
    border-bottom: 2.5px solid #1a2028;
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }
  .check-label { flex: 1; line-height: 1.6; font-size: 18px; }
  .check-item.checked .check-label { color: var(--text); }
  .check-step {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-light);
    border: 1px solid var(--accent-border);
    border-radius: 4px;
    padding: 1px 6px;
    margin-right: 6px;
    vertical-align: middle;
  }
  .file-hint {
    display: block;
    font-size: 14px;
    color: var(--text-dim);
    font-family: inherit;
    margin-top: 2px;
    word-break: break-all;
  }
  .file-hint .folder { color: var(--text-muted); }
  /* ⚠️ warn items */
  .check-item.warn-item { background: var(--warn-light); border-radius: 6px; padding: 7px 8px; border-bottom: none; margin-bottom: 4px; }
  .check-item.warn-item .check-box { border-color: var(--warn); }
  .check-item.warn-item .file-hint { color: var(--warn); }
  .check-item.warn-item.checked { opacity: 1; }
  .warn-tag {
    display: inline-block;
    font-size: 13px;
    font-weight: 700;
    color: var(--warn);
    background: var(--warn-light);
    border: 1px solid var(--warn-border);
    border-radius: 4px;
    padding: 0 5px;
    margin-left: 5px;
    vertical-align: middle;
  }
  /* Optional items */
  .check-item.optional-item { opacity: .7; }
  .optional-tag {
    display: inline-block;
    font-size: 13px;
    color: var(--optional);
    background: var(--optional-light);
    border: 1px solid rgba(192,132,252,.3);
    border-radius: 4px;
    padding: 0 5px;
    margin-left: 5px;
    vertical-align: middle;
  }

  /* ── Collapsible section card ── */
  .collapsible-section.collapsed .section-body { display: none; }
  .collapsible-section.collapsed .section-collapse-icon { transform: rotate(-90deg); }

  /* ── Timestamp on checked items ── */
  .check-timestamp {
    display: block;
    font-size: 14px;
    color: var(--text);
    margin-top: 3px;
    font-style: italic;
    opacity: .7;
  }

  /* ── Versions grid container ── */
  .versions-grid { }

  /* ── Overall RQ progress bar ── */
  .rq-progress-sticky {
    position: sticky;
    top: 56px;
    z-index: 90;
    background: var(--bg);
    padding: 4px 0;
    margin-bottom: 20px;
  }
  .rq-progress-bar-wrap {
    height: 10px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .rq-progress-bar { height: 100%; background: linear-gradient(90deg, #7a9ab0, #6a9e85); border-radius: 4px; transition: width .4s; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(18,15,12,.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  #folderViewOverlay { backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); background: rgba(15,18,24,.65); }
  .modal {
    background: var(--surface);
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
    width: 480px;
    max-width: calc(100vw - 48px);
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    transform: translateY(20px) scale(.97);
    transition: transform .2s;
  }
  .modal-overlay.open .modal { transform: none; }

  /* ── Page scrollbar (fixed) ── */
  #pageScrollBar {
    position: fixed;
    right: 3px; top: 0; bottom: 0;
    width: 4px;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity .18s;
  }
  #pageScrollBar.cscroll-visible { opacity: 1; pointer-events: auto; }
  #pageScrollBar .cscroll-thumb {
    position: absolute;
    left: 0; right: 0;
    background: var(--border-dark);
    border-radius: 2px;
    cursor: grab;
    min-height: 28px;
  }
  #pageScrollBar .cscroll-thumb:hover { background: var(--text-dim); }
  #pageScrollBar .cscroll-thumb.dragging { cursor: grabbing; background: var(--accent); }

  /* ── Custom scrollbar ── */
  .cscroll-bar {
    position: absolute;
    right: 3px; top: 6px; bottom: 6px;
    width: 4px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .18s;
    z-index: 20;
    border-radius: 2px;
  }
  .cscroll-bar.cscroll-visible { opacity: 1; pointer-events: auto; }
  .cscroll-thumb {
    position: absolute;
    left: 0; right: 0;
    background: var(--border-dark);
    border-radius: 2px;
    cursor: grab;
    min-height: 28px;
  }
  .cscroll-thumb:hover { background: var(--text-dim); }
  .cscroll-thumb.dragging { cursor: grabbing; background: var(--accent); }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .modal-title { font-size: 20px; font-weight: 700; }
  .modal-close { background: none; border: none; cursor: pointer; font-size: 22px; color: var(--text-dim); padding: 4px; border-radius: 6px; }
  .modal-close:hover { color: var(--text); background: var(--bg); }
  .modal-body {
    padding: 20px 24px 20px 24px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    scrollbar-width: none;
    overscroll-behavior: contain;
    position: relative;
  }
  .modal-body::-webkit-scrollbar { display: none; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; flex-shrink: 0; }

  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .form-input {
    width: 100%; padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 18px; font-family: inherit;
    outline: none; transition: border-color .15s;
    background: var(--surface2);
    color: var(--text);
  }
  .form-input:focus { border-color: var(--accent); }

  .version-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .version-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
  }
  .version-row .ver-num {
    font-size: 14px; font-weight: 700;
    color: var(--accent);
    background: var(--accent-light);
    border: 1px solid var(--accent-border);
    border-radius: 4px;
    padding: 2px 7px;
    min-width: 28px;
    text-align: center;
  }
  .version-row input {
    flex: 1; border: none; background: transparent;
    font-size: 18px; font-family: inherit; outline: none;
    color: var(--text);
  }
  .version-row .del-ver {
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 16px; padding: 0 4px;
    border-radius: 4px; transition: color .15s;
  }
  .version-row .del-ver:hover { color: var(--danger); }
  .btn-add-ver {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    border: 1.5px dashed var(--border-dark);
    border-radius: var(--radius-sm);
    background: none; cursor: pointer;
    font-size: 16px; color: var(--text-muted);
    width: 100%; justify-content: center;
    transition: all .15s;
  }
  .btn-add-ver:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  .btn { padding: 10px 22px; border-radius: var(--radius-sm); font-size: 18px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #1a2028; }
  .btn-primary:hover { background: #b0bec5; }
  .btn-ghost { background: none; color: var(--text-muted); border: 1.5px solid var(--border); }
  .btn-ghost:hover { background: var(--bg); }

  /* ── Confirm dialog ── */
  .confirm-overlay {
    position: fixed; inset: 0; background: rgba(18,15,12,.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 300; opacity: 0; pointer-events: none; transition: opacity .15s;
  }
  .confirm-overlay.open { opacity: 1; pointer-events: all; }
  .confirm-box {
    background: var(--surface); border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
    width: 360px; max-width: calc(100vw - 48px);
    padding: 24px; text-align: center;
  }
  .confirm-box .confirm-icon { font-size: 32px; margin-bottom: 12px; }
  .confirm-box h3 { font-size: 19px; margin-bottom: 8px; }
  .confirm-box p { color: var(--text-muted); margin-bottom: 20px; font-size: 16px; }
  .confirm-btns { display: flex; gap: 10px; justify-content: center; }

  .path-info {
    font-size: 14px;
    color: var(--text-muted);
    font-family: inherit;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 10px;
    margin-bottom: 10px;
    word-break: break-all;
  }
  .path-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-dim); margin-bottom: 2px; display: block; }

  /* ── Filename row with copy button ── */
  .filename-row {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .copy-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    padding: 0 5px;
    height: 19px;
    transition: all .15s;
    flex-shrink: 0;
    font-family: inherit;
    vertical-align: middle;
    line-height: 1;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .copy-btn.copied { border-color: var(--success); color: var(--success); background: var(--success-light); }
  /* ── Backup status ── */
  .backup-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .backup-status {
    font-size: 12px;
    white-space: nowrap;
    color: var(--text-dim);
  }
  .backup-status.ok   { color: var(--success); }
  .backup-status.warn { color: var(--warn); }
  /* ── Edit versions button ── */
  .btn-edit-versions {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 12px;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    background: none;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
  }
  .btn-edit-versions:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  /* ── Header dropdown menu ── */
  .header-menu-wrap { position: relative; flex-shrink: 0; }
  .btn-header-menu {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 13px;
    background: none; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); cursor: pointer;
    font-size: 15px; color: var(--text-muted);
    font-family: inherit; transition: all .15s; white-space: nowrap;
  }
  .btn-header-menu:hover,
  .btn-header-menu.open { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .header-dropdown {
    display: none;
    position: absolute; top: calc(100% + 6px); right: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); box-shadow: var(--shadow);
    min-width: 160px; z-index: 200; overflow: hidden;
  }
  .header-dropdown.open { display: block; }
  .header-dropdown-item {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    cursor: pointer; font-size: 15px; color: var(--text-muted);
    font-family: inherit; background: none; border: none;
    width: 100%; text-align: left; transition: background .12s;
    white-space: nowrap;
  }
  .header-dropdown-item:hover { background: var(--accent-light); color: var(--accent); }
  .header-dropdown-sep {
    border: none; border-top: 1px solid var(--border); margin: 4px 0;
  }
  .header-dropdown-backup-status {
    padding: 6px 16px 10px;
    font-size: 12px; color: var(--text-dim);
    text-align: center;
  }
  .header-dropdown-backup-status.ok   { color: var(--success); }
  .header-dropdown-backup-status.warn { color: var(--warn); }

  /* ── Header utility buttons ── */
  .btn-save-file, .btn-history {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 13px;
    background: none; border: 1.5px solid var(--border);
    border-radius: 20px; cursor: pointer;
    font-size: 15px; color: var(--text-muted);
    font-family: inherit; transition: all .15s; white-space: nowrap;
  }
  .btn-save-file:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .btn-history:hover   { border-color: var(--accent);  color: var(--accent);  background: var(--accent-light); }

  /* ── Archive banner (100% complete) ── */
  .archive-banner {
    background: var(--success-light);
    border: 1.5px solid rgba(106,158,133,.4);
    border-radius: var(--radius);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .archive-banner-text { color: var(--success); font-size: 18px; font-weight: 600; }
  .btn-archive {
    padding: 7px 20px; border-radius: var(--radius-sm);
    background: var(--success); color: #1a2028;
    border: none; cursor: pointer; font-size: 16px; font-weight: 700;
    font-family: inherit; transition: opacity .15s;
  }
  .btn-archive:hover { opacity: .82; }

  /* ── File list output modal ── */
  #listOutputOverlay .modal { width: 620px; }
  #listOutputPre {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px;
    font-size: 13px; line-height: 1.6; white-space: pre;
    overflow: auto; max-height: 55vh; scrollbar-width: none;
    font-family: 'Consolas', 'Courier New', monospace;
    color: var(--text-muted); user-select: text;
  }
  #listOutputPre::-webkit-scrollbar { display: none; }

  /* ── History modal ── */
  .history-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 10px;
  }
  .history-item-header { display: flex; align-items: center; gap: 10px; }
  .history-item-id { font-size: 17px; font-weight: 700; flex: 1; }
  .history-item-archived { font-size: 13px; color: var(--success); }
  .history-item-meta { font-size: 13px; color: var(--text-dim); margin-top: 5px; }
  .history-item-actions { display: flex; gap: 8px; margin-top: 10px; }

// ────────────────────────────
// Date helper
// ────────────────────────────
function todayDate() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

// ────────────────────────────
// Copy filename to clipboard
// ────────────────────────────
function copyFilename(btn) {
  const text = btn.dataset.fn;
  const doFeedback = () => {
    const orig = btn.dataset.icon || btn.textContent || '⧉';
    btn.textContent = '✓';
    btn.classList.add('copied');
    if (btn._revertTimer) clearTimeout(btn._revertTimer);
    btn._revertTimer = setTimeout(() => {
      btn.textContent = orig;
      btn.classList.remove('copied');
      btn._revertTimer = null;
    }, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(doFeedback).catch(() => {
      fallbackCopy(text); doFeedback();
    });
  } else { fallbackCopy(text); doFeedback(); }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); } catch {}
  document.body.removeChild(ta);
}

// ────────────────────────────
// Data model
// ────────────────────────────
const STORAGE_KEY_INDEX = 'rqtracker_index'; // array of rq ids
const rqKey = id => 'rqtracker_rq_' + id;

function loadIndex() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY_INDEX)) || []; } catch { return []; }
}
function saveIndex(arr) { localStorage.setItem(STORAGE_KEY_INDEX, JSON.stringify(arr)); }
function loadRQ(id) {
  try { return JSON.parse(localStorage.getItem(rqKey(id))); } catch { return null; }
}
function saveRQ(id, data) { localStorage.setItem(rqKey(id), JSON.stringify(data)); }
function deleteRQ(id) {
  localStorage.removeItem(rqKey(id));
  const idx = loadIndex().filter(x => x !== id);
  saveIndex(idx);
}

// ────────────────────────────
// App state
// ────────────────────────────
let activeRQ = null;
let confirmCallback = null;

// Extract pure RQ number from combined ID like "RQ100050647_需求名稱..."
function rqNumber(id) {
  const m = String(id).match(/(RQ\d+)/i);
  return m ? m[1] : id;
}

// Extract short version identifier from version name (last word)
function versionId(name) {
  const parts = name.trim().split(/\s+/);
  return parts[parts.length - 1] || name;
}

// Map version ID to SBOM system folder name (SVN, with number prefix)
function sbomSystemFolder(vid) {
  const map = {
    'pstID':   '1_網路郵局中文版',

    'pstmail': '8_郵件查詢前台',
  };
  return map[vid] || `{系統_${vid}}`;
}

// Map version ID to SBOM customer folder name (no number prefix)
function sbomCustomerFolder(vid) {
  return sbomSystemFolder(vid).replace(/^\d+_/, '');
}

// Progress calculation
// ────────────────────────────
function calcProgress(rqData) {
  const versions = rqData.versions || [];
  const checks   = rqData.checks   || {};

  const allTasks = [
    ...sharedFlowTasks(),
    ...versions.flatMap((v, i) => [
      ...versionDevTasks(i),
      ...versionDeliverables(i, rqData, v.name),
      ...versionSVNTasks(i, v.name, rqData),
    ]),
    ...finalDeliveryTasks(rqData),
    ...sharedSVNTasks(rqData),
  ].filter(t => !t.optional);

  const total = allTasks.length;
  const done  = allTasks.filter(t => checks[t.key]).length;
  return { done, total };
}

function calcVersionProgress(rqData, vIdx) {
  const v = rqData.versions[vIdx];
  const checks = rqData.checks || {};
  const tasks = [
    ...versionDevTasks(vIdx),
    ...versionDeliverables(vIdx, rqData, v.name),
    ...versionSVNTasks(vIdx, v.name, rqData),
  ];
  const total = tasks.length;
  const done = tasks.filter(t => checks[t.key]).length;
  return { done, total };
}

function renderCheckList(tasks, rq, showOptional = false, showStep = false) {
  const checks = rq.checks || {};
  const timestamps = rq.timestamps || {};
  return tasks.map(t => {
    const isChecked = !!checks[t.key];
    const isWarn = !!t.warn;
    const isOpt = !!t.optional;
    let cls = 'check-item';
    if (isChecked) cls += ' checked';
    if (isWarn) cls += ' warn-item';
    if (isOpt) cls += ' optional-item';

    const stepHtml = (showStep && t.step) ? `<span class="check-step">${t.step}</span>` : '';
    const warnTag = isWarn ? `<span class="warn-tag">⚠ ${t.warnText || '注意'}</span>` : '';
    const optTag = isOpt ? `<span class="optional-tag">選填</span>` : '';
    const subHtml = t.sub ? ` <span style="font-size:15px;color:var(--text-dim)">${t.sub}</span>` : '';
    const tsHtml = (isChecked && timestamps[t.key])
      ? `<span class="check-timestamp">✓ ${escHtml(timestamps[t.key])}</span>`
      : '';

    let fileHtml = '';
    if (t.folder || t.filename) {
      fileHtml = `<span class="file-hint">`;
      if (t.folder) {
        const folderEsc = escHtml(t.folder);
        // If no filename, the dot goes after the folder path (folder existence = success)
        const folderDot = !t.filename
          ? `<span class="file-status fs-scan" id="fst_${t.key}" title="偵測中…"></span>`
          : '';
        fileHtml += `<span class="folder">${folderDot}${folderEsc}<button class="copy-btn" onclick="event.stopPropagation();copyFilename(this)" data-fn="${folderEsc}" data-icon="⧉" title="複製路徑">⧉</button></span>`;
      }
      if (t.filename) {
        const fnEsc = escHtml(t.filename);
        fileHtml += (t.folder ? '<br>' : '') +
          `<span class="filename-row"><span class="file-status fs-scan" id="fst_${t.key}" title="偵測中…"></span>${fnEsc}<button class="copy-btn" onclick="event.stopPropagation();copyFilename(this)" data-fn="${fnEsc}" data-icon="⧉" title="複製檔名">⧉</button></span>`;
      }
      fileHtml += `</span>`;
    }

    return `
      <div class="${cls}" onclick="checkItemRow('${rq.id}','${t.key}')">
        <div class="check-box" onclick="event.stopPropagation();checkBoxClick('${rq.id}','${t.key}')"></div>
        <div class="check-label">${stepHtml}${escHtml(t.label)}${subHtml}${warnTag}${optTag}${fileHtml}${tsHtml}</div>
      </div>
    `;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Strip Windows-invalid characters from a single folder name segment
// Invalid in Windows filename: \ / : * ? " < > |
// We keep \ and : since they appear in full paths, only strip from name segments
function winSafeName(s) {
  return String(s).replace(/[\/\*\?"<>\|]/g, '');
}

  return ts ? `<span class="section-done-ts">✓ ${escHtml(ts)}</span>` : '';

function updateSectionTimestamps(rq) {
  rq.sectionDone = rq.sectionDone || {};
  const checks = rq.checks || {};
  const now = new Date().toLocaleString('zh-TW', {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit'
  });
  function checkSection(key, tasks) {
    const required = tasks.filter(t => !t.optional);
    const allDone = required.length > 0 && required.every(t => checks[t.key]);
    if (allDone && !rq.sectionDone[key]) rq.sectionDone[key] = now;
    else if (!allDone) delete rq.sectionDone[key];
  }
  (rq.versions || []).forEach((v, i) => {
    checkSection(`dev_v${i}`, versionDevTasks(i));
    checkSection(`svn_v${i}`, versionSVNTasks(i, v.name, rq));
    checkSection(`del_v${i}`, versionDeliverables(i, rq, v.name));
  });
  checkSection('shared_fin', finalDeliveryTasks(rq));
  checkSection('shared_svn', sharedSVNTasks(rq));
}

// 點 row 任意位置：只勾選，已勾選不做任何事
function checkItemRow(rqId, key) {
  const rq = loadRQ(rqId);
  if (!rq) return;
  if (rq.checks && rq.checks[key]) return;
  doCheck(rqId, key);
}

// 點 checkbox 方格：未勾 → 勾選；已勾 → 彈確認取消
function checkBoxClick(rqId, key) {
  const rq = loadRQ(rqId);
  if (!rq) return;
  if (rq.checks && rq.checks[key]) {
    askUncheck(rqId, key);
  } else {
    doCheck(rqId, key);
  }
}

function doCheck(rqId, key) {
  const rq = loadRQ(rqId);
  if (!rq) return;
  rq.checks = rq.checks || {};
  rq.timestamps = rq.timestamps || {};
  rq.checks[key] = true;
  rq.timestamps[key] = new Date().toLocaleString('zh-TW', {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit'
  });
  updateSectionTimestamps(rq);
  saveRQ(rqId, rq);
  renderTabs();
  renderRQ(rqId);
}

function askUncheck(rqId, key) {
  showConfirm({
    icon: '↩',
    title: '取消勾選',
    msg: '確定要取消勾選此項目？',
    actionText: '取消勾選',
    actionStyle: 'background:var(--warn)',
    callback: () => {
      const rq = loadRQ(rqId);
      if (!rq) return;
      rq.checks = rq.checks || {};
      rq.timestamps = rq.timestamps || {};
      rq.checks[key] = false;
      delete rq.timestamps[key];
      updateSectionTimestamps(rq);
      saveRQ(rqId, rq);
      closeConfirm();
      renderTabs();
      renderRQ(rqId);
    },
  });
}

function openModal(mode = 'new', rqId = null, isArchive = false, archiveIdx = null) {

    addVersionRow();
  }

  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById(mode === 'edit' ? 'inputProjectNum' : 'inputRqId').focus(), 100);
  const mBody = document.querySelector('#modalOverlay .modal-body');
  setTimeout(() => {
    if (mBody && mBody._alignScrollbar) mBody._alignScrollbar();
    if (mBody && mBody._syncScroll) mBody._syncScroll();
  }, 80);
}

}

function submitModal() {
  if (modalMode === 'edit') {
    submitEditVersions();
  } else {

  }
}

function submitEditVersions() {
  const oldId = editingRQId;
  const newId = document.getElementById('inputRqId').value.trim();
  if (!newId) { alert('RQ 編號不可為空'); return; }

  const rows = document.querySelectorAll('#versionList .version-row');
  const newVersions = [];
  rows.forEach((r, i) => {
    const name = r.querySelector('input').value.trim();
    if (name) newVersions.push({ id: `v${i}`, name });
  });
  const pn = document.getElementById('inputProjectNum').value.trim();

  // ── 歸檔編輯模式：存回 history，不影響 active RQ ──
  if (editingArchiveIdx !== null) {
    const history = loadHistory();
    const rq = history[editingArchiveIdx];
    if (!rq) { closeModal(); return; }
    rq.id = newId;
    rq.versions = newVersions;
    if (pn) rq.projectNum = pn; else delete rq.projectNum;
    saveHistory(history);
    closeModal();
    showHistoryModal();
    return;
  }

  // ── 一般編輯模式 ──
  const rq = loadRQ(oldId);
  if (!rq) return;
  rq.versions = newVersions;
  if (pn) rq.projectNum = pn; else delete rq.projectNum;

  if (newId !== oldId) {
    // Rename: move data to new key, update index
    rq.id = newId;
    saveRQ(newId, rq);
    localStorage.removeItem(`rq_${oldId}`);
    const idx = loadIndex();
    const pos = idx.indexOf(oldId);
    if (pos !== -1) idx.splice(pos, 1, newId); else if (!idx.includes(newId)) idx.push(newId);
    saveIndex(idx);
    closeModal();
    activeRQ = newId;
    localStorage.setItem('rq_active', newId);
  } else {
    saveRQ(oldId, rq);
    closeModal();
  }
  renderTabs();
  renderRQ(activeRQ);
}

function addVersionRow(initialName = '') {

  const row = document.createElement('div');

function submitNewRQ() {
  const id = document.getElementById('inputRqId').value.trim();
  if (!id) { alert('請輸入 RQ 編號_需求內容'); return; }

  const rows = document.querySelectorAll('#versionList .version-row');

  rows.forEach((r, i) => {

  if (versions.length === 0) {

  const existing = loadRQ(id);
  if (existing) {

// Folder view
// ────────────────────────────
function openFolderView() {
  if (!activeRQ) return;
  const rq = loadRQ(activeRQ);
  if (!rq) return;

  const delivMap = new Map(); // folder -> [{filename, warn, optional, key}]
  const svnMap   = new Map(); // folder -> [{label, filename, key}]

  function addDelivery(t) {
    if (!t.folder || !t.filename) return;
    if (!delivMap.has(t.folder)) delivMap.set(t.folder, []);
    t.filename.split(/\s*\+\s*/).map(f => f.trim()).filter(Boolean).forEach(f => {
      delivMap.get(t.folder).push({ filename: f, warn: t.warn, optional: t.optional, key: t.key });
    });
  }
  function addSVN(t) {
    if (!t.folder) return;
    if (!svnMap.has(t.folder)) svnMap.set(t.folder, []);
    svnMap.get(t.folder).push({ label: t.label, filename: t.filename, key: t.key });
  }

  rq.versions.forEach((v, i) => {
    versionDeliverables(i, rq, v.name).forEach(addDelivery);
    versionSVNTasks(i, v.name, rq).forEach(addSVN);
  });
  finalDeliveryTasks(rq).forEach(addDelivery);
  sharedSVNTasks(rq).forEach(addSVN);

  const checks = rq.checks || {};
  const timestamps = rq.timestamps || {};

  function renderFolderGroup(folder, items) {
    const fileRows = items.map(item => {
      const name      = item.filename || item.label;
      const isChecked = item.key ? !!checks[item.key] : false;
      const ts        = isChecked && item.key && timestamps[item.key]
        ? `<span class="check-timestamp" style="font-size:12px;display:block;white-space:nowrap">${escHtml(timestamps[item.key])}</span>` : '';
      const checkEl   = item.key
        ? `<div class="folder-check-box${isChecked?' checked':''}" onclick="folderToggleCheck('${rq.id}','${item.key}')"></div>` : '';
      const warnTag   = item.warn     ? `<span class="warn-tag">⚠ 當天</span>` : '';
      const optTag    = item.optional ? `<span class="optional-tag">選填</span>` : '';
      const copyBtns = item.filename ? (() => {
        const fullPath = folder.replace(/\\$/, '') + '\\' + item.filename;
        return `<button class="copy-btn" onclick="event.stopPropagation();copyFilename(this)" data-fn="${escHtml(item.filename)}" data-icon="⧉" title="複製檔名">⧉</button>` +
               `<button class="copy-btn" onclick="event.stopPropagation();copyFilename(this)" data-fn="${escHtml(fullPath)}" data-icon="⧉📂" title="複製完整路徑" style="font-size:10px">⧉📂</button>`;
      })() : '';
      const cls = `folder-file-row${item.warn?' warn-file':''}${item.optional?' optional-file':''}`;
      return `<div class="${cls}">${checkEl}<span class="folder-file-name">${escHtml(name)}${ts}</span>${warnTag}${optTag}${copyBtns}</div>`;
    }).join('');

    const folderCopy = `<button class="copy-btn" onclick="event.stopPropagation();copyFilename(this)" data-fn="${escHtml(folder)}" data-icon="⧉" title="複製路徑">⧉</button>`;
    return `
      <div class="folder-group">
        <div class="folder-path-row"><span class="folder-path-text">${escHtml(folder)}</span>${folderCopy}</div>
        <div class="folder-files">${fileRows}</div>
      </div>`;
  }

  let html = '';
  if (delivMap.size === 0 && svnMap.size === 0) {
    html = '<div style="text-align:center;padding:32px;color:var(--text-dim)">尚無版本資料</div>';
  } else {
    if (delivMap.size > 0) {
      html += `<div class="folder-section-title">📂 交付給客戶</div>`;
      delivMap.forEach((files, folder) => { html += renderFolderGroup(folder, files); });
    }
    if (svnMap.size > 0) {
      html += `<div class="folder-section-title">📂 SVN 內部</div>`;
      svnMap.forEach((items, folder) => { html += renderFolderGroup(folder, items); });
    }
  }

  const fvContent = document.getElementById('folderViewContent');
  fvContent.innerHTML = html;
  fvContent.scrollTop = 0;
  document.getElementById('folderViewOverlay').classList.add('open');
  setTimeout(() => {
    if (fvContent._alignScrollbar) fvContent._alignScrollbar();
    if (fvContent._syncScroll) fvContent._syncScroll();
  }, 80);
}

  openFolderView();        // refresh modal content in-place

// ────────────────────────────
// Custom scrollbar
// ────────────────────────────
function makeCustomScrollbar(opts) {
  // opts: { isPage, scrollEl, trackEl, thumbEl }
  const { isPage, scrollEl, trackEl, thumbEl } = opts;

  function scrollTop()    { return isPage ? window.scrollY : scrollEl.scrollTop; }
  function scrollHeight() { return isPage ? document.documentElement.scrollHeight : scrollEl.scrollHeight; }
  function clientHeight() { return isPage ? window.innerHeight : scrollEl.clientHeight; }
  function trackHeight()  { return trackEl.getBoundingClientRect().height; }

  let hideTimer = null;
  function showBar() {
    trackEl.classList.add('cscroll-visible');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => trackEl.classList.remove('cscroll-visible'), 1200);
  }

  function sync() {
    const scrollable = scrollHeight() - clientHeight();
    if (scrollable <= 0) {
      trackEl.classList.remove('cscroll-visible');
      return;
    }
    const tH = trackHeight();
    if (tH <= 0) return;
    const ratio = clientHeight() / scrollHeight();
    const thumbH = Math.max(28, ratio * tH);
    const thumbTop = (scrollTop() / scrollable) * (tH - thumbH);
    thumbEl.style.height = thumbH + 'px';
    thumbEl.style.top = thumbTop + 'px';
    thumbEl.style.transform = 'none';
    // For page: show bar whenever there's scrollable content
    if (isPage) showBar();
  }

  function syncAndShow() { sync(); showBar(); }

  const scrollTarget = isPage ? window : scrollEl;
  scrollTarget.addEventListener('scroll', syncAndShow, { passive: true });
  window.addEventListener('resize', sync, { passive: true });

  // For page: also show on mousemove near right edge
  if (isPage) {
    document.addEventListener('mousemove', e => {
      if (e.clientX > window.innerWidth - 20) { sync(); showBar(); }
    }, { passive: true });
  } else {
    // For modal-body: show while hovering modal, hide on leave
    const parentModal = scrollEl.closest('.modal');
    if (parentModal) {
      parentModal.addEventListener('mouseenter', () => { sync(); showBar(); });
      parentModal.addEventListener('mousemove',  () => { sync(); showBar(); });
      parentModal.addEventListener('mouseleave', () => {
        clearTimeout(hideTimer);
        hideTimer = null;
        trackEl.classList.remove('cscroll-visible');
      });
    }
  }

  let drag = null;
  thumbEl.addEventListener('mousedown', e => {
    drag = { startY: e.clientY, startScroll: scrollTop() };
    thumbEl.classList.add('dragging');
    e.preventDefault();
    e.stopPropagation();
  });
  document.addEventListener('mousemove', e => {
    if (!drag) return;
    const tH = trackHeight();
    const thumbH = thumbEl.getBoundingClientRect().height;
    const ratio = (scrollHeight() - clientHeight()) / Math.max(1, tH - thumbH);
    const newScroll = drag.startScroll + (e.clientY - drag.startY) * ratio;
    if (isPage) window.scrollTo({ top: newScroll });
    else scrollEl.scrollTop = newScroll;
  });
  document.addEventListener('mouseup', () => {
    if (drag) { drag = null; thumbEl.classList.remove('dragging'); }
  });

  scrollEl._syncScroll = sync;
  setTimeout(sync, 100);
}

function initAllScrollbars() {
  // Page scrollbar
  const pageBar = document.getElementById('pageScrollBar');
  if (pageBar) {
    makeCustomScrollbar({
      isPage: true,
      scrollEl: document.documentElement,
      trackEl: pageBar,
      thumbEl: pageBar.querySelector('.cscroll-thumb'),
    });
  }
  // Modal scrollbars — track inside .modal (survives innerHTML changes), aligned to .modal-body
  document.querySelectorAll('.modal').forEach(modal => {
    const body = modal.querySelector('.modal-body');
    if (!body) return;
    const track = document.createElement('div');
    track.className = 'cscroll-bar';
    const thumb = document.createElement('div');
    thumb.className = 'cscroll-thumb';
    track.appendChild(thumb);
    modal.appendChild(track);

    // Position track to align with .modal-body (not header/footer)
    function alignTrack() {
      const mr = modal.getBoundingClientRect();
      const br = body.getBoundingClientRect();
      if (mr.height > 0 && br.height > 0) {
        track.style.top    = (br.top - mr.top) + 'px';
        track.style.bottom = (mr.bottom - br.bottom) + 'px';
      }
    }

    makeCustomScrollbar({ isPage: false, scrollEl: body, trackEl: track, thumbEl: thumb });
    modal.addEventListener('mouseenter', alignTrack);
    window.addEventListener('resize', alignTrack);
    body._alignScrollbar = alignTrack;
  });
}

async function getStoredHandle(type) {

  try {

  const db = await openBackupDB();
  return new Promise((res, rej) => {
    const tx  = db.transaction(BACKUP_STORE_NAME, 'readwrite');
    const req = tx.objectStore(BACKUP_STORE_NAME).put(handle, DISK_HANDLE_KEYS[type]);
    req.onsuccess = () => res();
    req.onerror   = e => rej(e.target.error);
  });
}

// Resolve which handle covers this path; strips the matching prefix, returns {handle, relPath}
function resolveHandle(folderPath) {
  for (const [type, prefix] of Object.entries(DISK_PREFIXES)) {
    if (folderPath.startsWith(prefix) || folderPath.toLowerCase().startsWith(prefix.toLowerCase())) {
      const rel = folderPath.slice(prefix.length).replace(/\\$/, '');
      return { handle: diskHandles[type], rel };
    }
  }
  return { handle: null, rel: null };
}

async function navigateToFolder(handle, relPath) {
  const parts = relPath.split('\\').filter(Boolean);
  let cur = handle;
  for (const p of parts) {
    try { cur = await cur.getDirectoryHandle(p); }
    catch { return null; }
  }
  return cur;
}

async function navigateToFolderCreate(handle, relPath) {
  const parts = relPath.split('\\').filter(Boolean);
  let cur = handle;
  for (const p of parts) {
    cur = await cur.getDirectoryHandle(p, { create: true });
  }
  return cur;
}

async function createRQFolders() {
  if (!diskHandles.downloads) {
    showSaveToast('✗ 請先設定 D:\\Systex 資料夾');
    return;
  }
  const rq = loadRQ(activeRQ);
  if (!rq) return;

  const prefix = DISK_PREFIXES.downloads;
  const tasks = [
    ...sharedFlowTasks(),
    ...(rq.versions || []).flatMap((v, i) => [
      ...versionDevTasks(i),
      ...versionDeliverables(i, rq, v.name),
      ...versionSVNTasks(i, v.name, rq),
    ]),
    ...finalDeliveryTasks(rq),
    ...sharedSVNTasks(rq),
  ].filter(t => t.folder && t.folder.toLowerCase().startsWith(prefix.toLowerCase()) && !t.optional);

  // 收集不重複資料夾（checkHasFiles task 使用 createFolder）
  const folders = [...new Set(tasks.map(t => t.createFolder || t.folder))];

  let created = 0, failed = 0;
  for (const folder of folders) {
    const rel = folder.slice(prefix.length).replace(/\\$/, '');
    try {
      await navigateToFolderCreate(diskHandles.downloads, rel);
      created++;
    } catch { failed++; }
  }

  showSaveToast(failed === 0
    ? `✓ 已建立 ${created} 個資料夾`
    : `⚠ 建立完成：${created} 成功，${failed} 失敗`
  );
}

async function listFilesRecursive(dirHandle, prefix) {
  const files = [];
  for await (const [name, entry] of dirHandle.entries()) {
    const path = prefix ? `${prefix}\\${name}` : name;
    if (entry.kind === 'file') files.push(path);
    else files.push(...await listFilesRecursive(entry, path));
  }
  return files.sort();
}

async function generateFileList() {
  if (!diskHandles.downloads) {
    showSaveToast('✗ 請先設定 D:\\Systex 資料夾');
    return;
  }
  const rq = loadRQ(activeRQ);
  if (!rq) return;

  const prefix = DISK_PREFIXES.downloads;
  const relRoot = winSafeName(rq.id);
  const rqRootDir = await navigateToFolder(diskHandles.downloads, relRoot);
  if (!rqRootDir) {
    showSaveToast('✗ 找不到資料夾：' + prefix + relRoot);
    return;
  }

  // 找 {yyyymmdd}_{rqNum} 子資料夾（程式碼目錄）
  const rqNum = rqNumber(rq.id);
  const zipPat = new RegExp(`^\\d{8}_${rqNum.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}$`);
  let zipDirName = null;
  for await (const [name, entry] of rqRootDir.entries()) {
    if (entry.kind === 'directory' && zipPat.test(name)) { zipDirName = name; break; }
  }

  // 建立 vid → 顯示名稱 / vIdx map
  const vidDisplayMap = {}, vidIdxMap = {};
  (rq.versions || []).forEach((v, i) => {
    const vid = versionId(v.name);
    const parts = v.name.trim().split(/\s+/);
    vidDisplayMap[vid] = parts.length > 1 ? parts.slice(0, -1).join(' ') : v.name;
    vidIdxMap[vid] = i;
  });
  const vids = (rq.versions || []).map(v => versionId(v.name));

  const sections = [];

  // ── 版本段落：從 {zipDir}\{vid}\ 讀取，路徑顯示為 {vid}\... ──
  if (zipDirName) {
    for (const v of (rq.versions || [])) {
      const vid = versionId(v.name);
      const vIdx = vidIdxMap[vid];
      const display = vidDisplayMap[vid] || vid;
      const header = `[${display}]`;

      const vidDir = await navigateToFolder(diskHandles.downloads,
        `${relRoot}\\${zipDirName}\\${vid}`);
      const diskFiles = vidDir ? await listFilesRecursive(vidDir, vid) : [];

      const rawFiles = rq.versionFiles && rq.versionFiles[vIdx];
      const manualFiles = rawFiles
        ? rawFiles.split('\n').map(l => l.trim().replace(/\//g, '\\')).filter(Boolean)
            .map(l => `${vid}\\${l}`)
        : [];
      const diskSet = new Set(diskFiles);
      const allFiles = [...manualFiles.filter(f => !diskSet.has(f)), ...diskFiles];
      if (allFiles.length > 0) sections.push(header + '\n' + allFiles.join('\n'));
    }
  } else {
    // zip 資料夾不存在，仍列出手動輸入的改動程式
    for (const v of (rq.versions || [])) {
      const vid = versionId(v.name);
      const vIdx = vidIdxMap[vid];
      const rawFiles = rq.versionFiles && rq.versionFiles[vIdx];
      if (!rawFiles) continue;
      const manualFiles = rawFiles.split('\n').map(l => l.trim().replace(/\//g, '\\')).filter(Boolean)
        .map(l => `${vid}\\${l}`);
      if (manualFiles.length === 0) continue;
      sections.push(`[${vidDisplayMap[vid] || vid}]\n` + manualFiles.join('\n'));
    }
  }

  // ── 其他段落：安全性文件、SBOM、測試報告（直接在 {rqId}\ 下）──
  const folderOrder = ['安全性文件', 'SBOM', '測試報告'];
  const otherDirs = [];
  for await (const [name, entry] of rqRootDir.entries()) {
    if (entry.kind === 'directory' && name !== zipDirName) otherDirs.push({ name, entry });
  }
  otherDirs.sort((a, b) => {
    const ai = folderOrder.indexOf(a.name), bi = folderOrder.indexOf(b.name);
    if (ai !== -1 && bi !== -1) return ai - bi;
    if (ai !== -1) return -1;
    if (bi !== -1) return 1;
    return a.name.localeCompare(b.name, 'zh-TW');
  });
  for (const { name, entry } of otherDirs) {
    const files = await listFilesRecursive(entry, name);
    if (files.length > 0) sections.push(`[${name}]\n` + files.join('\n'));
  }

  const output = sections.join('\n\n');

  document.getElementById('listOutputPre').textContent = output || '（資料夾是空的）';
  document.getElementById('listOutputOverlay').classList.add('open');

  try {
    const listFh = await rqRootDir.getFileHandle('list.txt', { create: true });
    const writable = await listFh.createWritable();
    await writable.write(output);
    await writable.close();
    showSaveToast('✓ list.txt 已寫入');
  } catch (e) {
    showSaveToast('✗ 寫入失敗：' + e.message);
  }
}

// Build regex pattern for wildcard filenames
function buildFilenamePattern(filename) {
  return new RegExp(
    '^' + filename
      .replace(/[.+?^${}()|[\]\\]/g, '\\$&')
      .replace(/\d{8}/g, '\\d{8}')
      .replace(/Vx\\\.x/g, 'V\\d+\\.\\d+')
    + '$'
  );
}

// Check one file; returns bool
async function checkSingleFile(dir, filename) {
  if (/\d{8}/.test(filename) || /Vx\.x/.test(filename)) {
    const pattern = buildFilenamePattern(filename);
    for await (const [name, entry] of dir.entries()) {
      if (entry.kind === 'file' && pattern.test(name)) return true;
    }
    return false;
  }
  try { await dir.getFileHandle(filename); return true; } catch { return false; }
}

// Check one file and return lastModified (ms); returns { found, lastModified }
async function checkSingleFileWithTime(dir, filename) {
  if (/\d{8}/.test(filename) || /Vx\.x/.test(filename)) {
    const pattern = buildFilenamePattern(filename);
    for await (const [name, entry] of dir.entries()) {
      if (entry.kind === 'file' && pattern.test(name)) {
        try { const f = await entry.getFile(); return { found: true, lastModified: f.lastModified }; } catch {}
      }
    }
    return { found: false, lastModified: null };
  }
  try {
    const fh = await dir.getFileHandle(filename);
    const f  = await fh.getFile();
    return { found: true, lastModified: f.lastModified };
  } catch { return { found: false, lastModified: null }; }
}

// Recursively check if a directory contains any files
async function checkFolderHasFiles(dir) {
  for await (const [name, entry] of dir.entries()) {
    if (entry.kind === 'file') return true;
    if (entry.kind === 'directory') {
      try {
        const subDir = await dir.getDirectoryHandle(name);
        if (await checkFolderHasFiles(subDir)) return true;
      } catch {}
    }
  }
  return false;
}

async function checkFileExists(folderPath, filename, { sinceTime = null } = {}) {
  const { handle, rel } = resolveHandle(folderPath);
  if (!handle) return { state: 'unknown', found: 0, total: 0 };
  const dir = await navigateToFolder(handle, rel);
  if (!dir) return { state: 'none', found: 0, total: 0 };
  if (!filename) return { state: 'folder', found: 0, total: 0 };
  const files = filename.split(/\s*[+\/]\s*/).map(f => f.trim()).filter(Boolean);

  // sinceTime mode: single file only (checkModTime tasks always have one filename)
  if (sinceTime !== null && files.length === 1) {
    const { found, lastModified } = await checkSingleFileWithTime(dir, files[0]);
    if (!found) return { state: 'folder', found: 0, total: 1 };
    const state = lastModified > sinceTime ? 'file' : 'stale';
    return { state, found: 1, total: 1 };
  }

  const checks = await Promise.all(files.map(f => checkSingleFile(dir, f)));
  const found = checks.filter(Boolean).length;
  const total = files.length;
  const state = found === total ? 'file' : found > 0 ? 'partial' : 'folder';
  return { state, found, total };
}

async function tryGrantPermission(type) {
  const handle = await getStoredHandle(type);
  if (!handle) return false;
  try {
    let perm = await handle.queryPermission({ mode: 'readwrite' });
    if (perm !== 'granted') perm = await handle.requestPermission({ mode: 'readwrite' });
    if (perm === 'granted') { diskHandles[type] = handle; return true; }
  } catch {}
  return false;
}

function setFileStatusDot(key, result) {
  const { state, found, total } = typeof result === 'string'
    ? { state: result, found: 0, total: 0 }
    : result;
  fileStatusCache[key] = state;
  const el = document.getElementById(`fst_${key}`);
  if (!el) return;
  el.className = `file-status fs-${state === 'unknown' ? 'scan' : state}`;
  const base = {
    file:    `全部檔案存在（${total}/${total}）`,
    partial: `部分檔案存在（${found}/${total}）`,
    folder:  total > 0 ? `資料夾存在，檔案未找到（0/${total}）` : '資料夾存在，檔案未找到',
    stale:   '檔案存在，但建立 RQ 後尚未編輯',
    none:    '路徑尚未建立',
    scan:    '偵測中…',
    unknown: '未設定磁碟存取',
  };
  el.title = base[state] || '';
}

async function scanRQFiles() {
  const rq = loadRQ(activeRQ);
  if (!rq) return;

  renderDiskStatus('scanning');

  const tasks = [
    ...sharedFlowTasks(),
    ...(rq.versions || []).flatMap((v, i) => [
      ...versionDevTasks(i),
      ...versionDeliverables(i, rq, v.name),
      ...versionSVNTasks(i, v.name, rq),
    ]),
    ...finalDeliveryTasks(rq),
    ...sharedSVNTasks(rq),
  ].filter(t => t.folder && (t.filename || t.checkHasFiles));

  tasks.forEach(t => setFileStatusDot(t.key, 'scan'));

  let autoChecked = false;
  const scanResults = [];
  await Promise.allSettled(tasks.map(async t => {
    let result;
    if (t.checkHasFiles) {
      const { handle, rel } = resolveHandle(t.codeRoot); // codeRoot = D:\Systex\{rqId}\
      if (!handle) {
        result = { state: 'unknown', found: 0, total: 0 };
      } else {
        // 找 {yyyymmdd}_{rqNum} 子資料夾名稱
        const rqRootDir = await navigateToFolder(handle, rel);
        const rqNum = rqNumber(activeRQ);
        const zipPat = new RegExp(`^\\d{8}_${rqNum.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}$`);
        let zipDirName = null;
        if (rqRootDir) {
          for await (const [name, entry] of rqRootDir.entries()) {
            if (entry.kind === 'directory' && zipPat.test(name)) { zipDirName = name; break; }
          }
        }
        if (!zipDirName) {
          result = { state: 'none', found: 0, total: 0 };
        } else {
          // 用 navigateToFolder 一路走到 {zipDir}\{vid}
          const relBase = rel.replace(/\\$/, '');
          const vidDir = await navigateToFolder(handle, `${relBase}\\${zipDirName}\\${t.codeVid}`);
          if (!vidDir) {
            result = { state: 'folder', found: 0, total: 0 };
          } else {
            const rawFiles = rq.versionFiles && rq.versionFiles[t.codeVidIdx];
            const fileList = rawFiles
              ? rawFiles.split('\n').map(l => l.trim().replace(/\//g, '\\')).filter(Boolean)
              : [];
            if (fileList.length > 0) {
              // 確認每個列出的檔案都存在
              let foundCount = 0;
              for (const filePath of fileList) {
                const lastSep = filePath.lastIndexOf('\\');
                const dirPart = lastSep >= 0 ? filePath.slice(0, lastSep) : '';
                const fileName = lastSep >= 0 ? filePath.slice(lastSep + 1) : filePath;
                try {
                  const dir = dirPart ? await navigateToFolder(vidDir, dirPart) : vidDir;
                  if (dir) { await dir.getFileHandle(fileName); foundCount++; }
                } catch {}
              }
              result = foundCount === fileList.length
                ? { state: 'file', found: foundCount, total: fileList.length }
                : { state: 'folder', found: foundCount, total: fileList.length };
            } else {
              // 沒有填改動程式清單：資料夾有任何檔案即可
              const hasFiles = await checkFolderHasFiles(vidDir);
              result = hasFiles ? { state: 'file', found: 1, total: 1 } : { state: 'folder', found: 0, total: 0 };
            }
          }
        }
      }
    } else {
      const sinceTime = t.checkModTime && rq.createdAt ? new Date(rq.createdAt).getTime() : null;
      result = await checkFileExists(t.folder, t.filename, { sinceTime });
    }
    setFileStatusDot(t.key, result);
    const rqNow = loadRQ(activeRQ);
    const wasChecked = !!(rqNow && rqNow.checks && rqNow.checks[t.key]);
    let newlyChecked = false;
    // 檔案全部存在 → 自動打勾（若尚未勾選）
    if (result.state === 'file' && !wasChecked) {
      if (rqNow) {
        rqNow.checks = rqNow.checks || {};
        rqNow.timestamps = rqNow.timestamps || {};
        rqNow.checks[t.key] = true;
        rqNow.timestamps[t.key] = new Date().toLocaleString('zh-TW', {
          year: 'numeric', month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit'
        });
        updateSectionTimestamps(rqNow);
        saveRQ(activeRQ, rqNow);
        autoChecked = true;
        newlyChecked = true;
      }
    }
    scanResults.push({ t, result, wasChecked, newlyChecked });
  }));

  if (autoChecked) renderRQ(activeRQ);
  renderDiskStatus();
  showScanResultPanel(scanResults);
}

function showScanResultPanel(results) {
  const panel = document.getElementById('scanResultPanel');
  const title = document.getElementById('srpTitle');
  const body = document.getElementById('srpBody');
  if (!panel) return;

  // 已勾但找不到或尚未編輯 → 警告
  const broken = results.filter(r => r.wasChecked && r.result.state !== 'file');
  // 未勾且剛被自動打勾 → 新增提示
  const added = results.filter(r => r.newlyChecked);

  if (broken.length === 0 && added.length === 0) {
    panel.classList.remove('show');
    return;
  }

  const time = new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
  const parts = [];
  if (broken.length) parts.push(`⚠ ${broken.length} 個已勾但檔案不在`);
  if (added.length)  parts.push(`✓ ${added.length} 個新增自動打勾`);
  title.textContent = parts.join('　') + `　${time}`;

  let html = '';
  if (broken.length) {
    html += broken.map(({ t, result }) => {
      let dotColor, note;
      if (result.state === 'stale')        { dotColor = '#a78bfa'; note = '建立後尚未編輯'; }
      else if (result.state === 'partial') { dotColor = '#eab308'; note = `部分存在 (${result.found}/${result.total})`; }
      else                                  { dotColor = '#64748b'; note = '找不到檔案'; }
      return `<div class="srp-item">
        <span class="srp-item-dot" style="background:${dotColor}"></span>
        <span class="srp-item-label">${escHtml(t.label)} <span style="color:#94a3b8;font-size:12px;">${note}</span></span>
      </div>`;
    }).join('');
  }
  if (added.length) {
    html += added.map(({ t }) =>
      `<div class="srp-item">
        <span class="srp-item-dot" style="background:#22c55e"></span>
        <span class="srp-item-label">${escHtml(t.label)} <span style="color:#94a3b8;font-size:12px;">已自動打勾</span></span>
      </div>`
    ).join('');
  }
  body.innerHTML = html;

  clearTimeout(panel._t);
  panel.classList.add('show');
}

function closeScanPanel() {
  const panel = document.getElementById('scanResultPanel');
  if (panel) { clearTimeout(panel._t); panel.classList.remove('show'); }
}

async function autoScanOnLoad() {
  const [hd, hs] = await Promise.all([getStoredHandle('downloads'), getStoredHandle('svn')]);
  if (!hd && !hs) { renderDiskStatus(); return; }

  let anyGranted = false;
  for (const type of ['downloads', 'svn']) {
    const h = type === 'downloads' ? hd : hs;
    if (!h) continue;
    try {
      const perm = await h.queryPermission({ mode: 'readwrite' });

    document.getElementById('btnCreateFolders').style.display = '';
    document.getElementById('btnGenList').style.display = '';
    await scanRQFiles();

function renderDiskStatus(forceState) {
  const el = document.getElementById('diskStatus');
  if (!el) return;

  if (forceState === 'scanning') {
    el.textContent = '⟳ 掃描中…';
    el.className = 'header-dropdown-backup-status';
    return;
  }

  const hasD = !!diskHandles.downloads;
  const hasS = !!diskHandles.svn;
  let text, cls;

  if (!hasD && !hasS) {
    text = '磁碟存取未設定'; cls = '';
  } else if (hasD && hasS) {
    text = '✓ D:\\Systex + SVN 已授權'; cls = 'ok';
  } else {
    text = `✓ ${hasD ? 'D:\\Systex' : 'SVN'} 已授權`; cls = 'ok';
  }

  el.textContent = text;
  el.className = 'header-dropdown-backup-status' + (cls ? ' ' + cls : '');
}

// ────────────────────────────
// 自動備份（File System Access API + IndexedDB）
// ────────────────────────────
const BACKUP_DB_NAME    = 'rqtracker';
const BACKUP_STORE_NAME = 'config';
const BACKUP_HANDLE_KEY = 'backupDirHandle';
const BACKUP_DATE_KEY   = 'rq_backup_last_date';
const BACKUP_TIME_KEY   = 'rq_backup_last_time';
const BACKUP_DAYS       = 7;

function openBackupDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(BACKUP_DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(BACKUP_STORE_NAME);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

async function getBackupHandle() {
  try {
    const db  = await openBackupDB();
    return await new Promise((resolve, reject) => {
      const tx  = db.transaction(BACKUP_STORE_NAME, 'readonly');
      const req = tx.objectStore(BACKUP_STORE_NAME).get(BACKUP_HANDLE_KEY);
      req.onsuccess = e => resolve(e.target.result || null);
      req.onerror   = e => reject(e.target.error);
    });
  } catch { return null; }
}

async function saveBackupHandle(handle) {
  const db = await openBackupDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(BACKUP_STORE_NAME, 'readwrite');
    const req = tx.objectStore(BACKUP_STORE_NAME).put(handle, BACKUP_HANDLE_KEY);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}

async function doBackup(dirHandle) {
  const td   = todayDate();
  const json = JSON.stringify(getAllData(), null, 2);

  // 寫入今日備份
  const fileName   = `RQ_backup_${td}.json`;
  const fileHandle = await dirHandle.getFileHandle(fileName, { create: true });
  const writable   = await fileHandle.createWritable();
  await writable.write(json);
  await writable.close();

  // 清除 7 天前舊備份
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - BACKUP_DAYS);
  const cutoffStr = cutoff.toISOString().slice(0,10).replace(/-/g,''); // YYYYMMDD

  for await (const [name] of dirHandle.entries()) {
    const m = name.match(/^RQ_backup_(\d{8})\.json$/);
    if (m && m[1] < cutoffStr) {
      try { await dirHandle.removeEntry(name); } catch {}
    }
  }

  // 記錄備份時間
  const now = new Date().toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
  localStorage.setItem(BACKUP_DATE_KEY, td);
  localStorage.setItem(BACKUP_TIME_KEY, now);
  renderBackupStatus();
  showSaveToast('✓ 備份完成');
}

async function setupBackupDir() {
  if (!window.showDirectoryPicker) {
    alert('您的瀏覽器不支援 File System Access API，請使用 Chrome / Edge 116+');
    return;
  }
  try {
    const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite', id: 'rq-backup' });
    await saveBackupHandle(dirHandle);
    localStorage.removeItem(BACKUP_DATE_KEY); // 強制今日立即備份
    await doBackup(dirHandle);
  } catch (e) {
    if (e.name !== 'AbortError') showSaveToast('✗ 設定失敗：' + e.message);
  }
}

async function autoBackupOnLoad() {
  const handle = await getBackupHandle();
  if (!handle) { renderBackupStatus(); return; }

  const td = todayDate();
  if (localStorage.getItem(BACKUP_DATE_KEY) === td) { renderBackupStatus(); return; }

  try {
    const perm = await handle.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      await doBackup(handle);
    } else {
      // 需要使用者手勢才能重新申請，標示警示
      renderBackupStatus('reauth');
    }
  } catch { renderBackupStatus('reauth'); }
}

function renderBackupStatus(forceState) {
  const el = document.getElementById('backupStatus');
  if (!el) return;

  const setStatus = (text, state) => {
    el.textContent = text;
    el.className = 'header-dropdown-backup-status' + (state ? ' ' + state : '');
  };

  if (forceState === 'reauth') {
    setStatus('⚠ 備份需重新授權', 'warn');
    return;
  }

  const td       = todayDate();
  const lastDate = localStorage.getItem(BACKUP_DATE_KEY);
  const lastTime = localStorage.getItem(BACKUP_TIME_KEY);

  if (!lastDate) {
    getBackupHandle().then(h => {
      if (!h) setStatus('備份未設定', '');
      else     setStatus('⚠ 今日尚未備份', 'warn');
    });
    return;
  }

  if (lastDate === td) {
    setStatus(`✓ 今日已備份 ${lastTime || ''}`, 'ok');
  } else {
    setStatus('⚠ 今日尚未備份', 'warn');
  }
}

// ────────────────────────────
// Init
// ────────────────────────────
(function init() {
  const ids = loadIndex();
  if (ids.length) {
    const saved = localStorage.getItem('rq_active');
    activeRQ = (saved && ids.includes(saved)) ? saved : ids[0];
    renderTabs();
    renderRQ(activeRQ);
  }
  initAllScrollbars();
  autoBackupOnLoad();
  renderBackupStatus();
  autoScanOnLoad();
  setInterval(() => {
    if (diskHandles.downloads || diskHandles.svn) scanRQFiles();
  }, 3 * 60 * 1000);

  document.addEventListener('click', e => {
    const wrap = document.getElementById('headerMenuWrap');
    if (wrap && !wrap.contains(e.target)) closeHeaderMenu();
  });

  document.addEventListener('keydown', e => {
    const overlay = document.getElementById('confirmOverlay');
    if (!overlay.classList.contains('open')) return;
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      confirmDeleteAction();
    } else if (e.key === 'Escape') {
      closeConfirm();
    }
  });
})();
</script>

    <button class="srp-close" onclick="closeScanPanel()">✕</button>
  </div>
  <div class="srp-body" id="srpBody"></div>
</div>
